<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <title>Hatch Logo</title>
  <desc>Hatch AI cofounder logo — solid block H mark with wordmark</desc>

  <!-- Icon mark: orange tile, black H -->
  <rect width="100" height="100" rx="24" fill="#FF6B1A"/>
  <!-- Left stem -->
  <rect x="22" y="22" width="15" height="56" fill="#0E0E0E"/>
  <!-- Crossbar -->
  <rect x="42.5" y="42.5" width="15" height="15" fill="#0E0E0E"/>
  <!-- Right stem -->
  <rect x="63" y="22" width="15" height="56" fill="#0E0E0E"/>

  <!-- Wordmark: "hatch" -->
  <text
    x="118"
    y="72"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="64"
    letter-spacing="-2"
    fill="#0E0E0E"
  >hatch</text>
</svg>
