<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <title>Hatch Logo — Dark variant</title>
  <desc>Hatch AI cofounder logo — black tile with orange H mark, white wordmark</desc>

  <!-- Dark background for the full lockup so wordmark is visible -->
  <rect width="400" height="100" rx="0" fill="#0E0E0E"/>

  <!-- Icon mark: black tile, orange H -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#0E0E0E" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Left stem -->
  <rect x="22" y="22" width="15" height="56" fill="#FF6B1A"/>
  <!-- Crossbar -->
  <rect x="42.5" y="42.5" width="15" height="15" fill="#FF6B1A"/>
  <!-- Right stem -->
  <rect x="63" y="22" width="15" height="56" fill="#FF6B1A"/>

  <!-- Wordmark: "hatch" white -->
  <text
    x="118"
    y="72"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="64"
    letter-spacing="-2"
    fill="#FFFFFF"
  >hatch</text>
</svg>
